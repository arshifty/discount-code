<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Your Discount Code 🎁</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f7f9fc;
            margin: 0;
            padding: 20px;
            text-align: center;
            overflow-x: hidden;
        }

        /* Background */
        body::before,
        body::after {
            content: "";
            position: absolute;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
        }

        body::before {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            top: -60px;
            left: -60px;
        }

        body::after {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            bottom: -60px;
            right: -60px;
        }

        /* Card */
        .card {
            max-width: 480px;
            margin: 60px auto;
            background: #fff;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
        }

        h1 {
            font-size: 26px;
        }

        /* Input */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 14px;
            background: #2575fc;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:hover {
            background: #1a5edb;
        }

        /* Offer */
        .offer {
            background: #e7f5ff;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-weight: 500;
        }

        /* Countdown */
        .countdown {
            margin-top: 15px;
            color: #fa5252;
            font-weight: bold;
        }

        /* Success */
        .success-box {
            display: none;
            margin-top: 20px;
            background: #d3f9d8;
            padding: 15px;
            border-radius: 10px;
        }

        .code {
            font-size: 22px;
            font-weight: bold;
            color: #2b8a3e;
        }

        /* Status */
        .status {
            margin-top: 10px;
            font-size: 14px;
        }

        /* Mobile */
        @media (max-width: 500px) {
            .card {
                margin: 40px 10px;
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>🎁 Get 50% OFF Discount Code</h1>

        <p>Enter your email to unlock your exclusive discount!</p>

        <div class="offer">
            🔥 Limited Time Offer — Only Today!
        </div>

        <form id="discountform" action="https://formspree.io/f/xkokowpr" method="POST">
            <input type="email" name="email" placeholder="Enter your email" required>
            <button class="btn" id="submitBtn">Unlock Discount</button>
        </form>

        <div class="status" id="status"></div>

        <div class="countdown" id="timer">
            ⏳ Offer expires in: 05:00
        </div>

        <!-- Success -->
        <div class="success-box" id="successBox">
            <p>✅ Your Discount Code:</p>
            <div class="code">SAVE50</div>
            <p>Use this code at checkout!</p>
        </div>

    </div>

    <script>
        // Countdown
        let time = 300;

        setInterval(() => {
            let min = Math.floor(time / 60);
            let sec = time % 60;

            document.getElementById("timer").textContent =
                `⏳ Offer expires in: ${min}:${sec.toString().padStart(2, '0')}`;

            if (time > 0) time--;
        }, 1000);


        // Form
        const form = document.getElementById("discountform");
        const successBox = document.getElementById("successBox");
        const button = document.getElementById("submitBtn");
        const status = document.getElementById("status");

        // Error handler
        function handleError() {
            status.textContent = "❌ Something went wrong. Try again.";
            button.disabled = false;
            button.innerHTML = "Unlock Discount";
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            button.innerHTML = "⏳ Processing...";
            button.disabled = true;

            try {
                const response = await fetch(form.action, {
                    method: form.method,
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });

                if (!response.ok) throw new Error();

                // Success
                form.style.display = "none";
                successBox.style.display = "block";
                status.textContent = "";

            } catch {
                handleError();
            }
        });
    </script>

</body>

</html>
