<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive VIP Access | Discount</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            /* Dark Slate */
            background-image:
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.2) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.2) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .animated-btn {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .animated-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.6);
            filter: brightness(1.1);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* Float Animation */
        .float {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }
    </style>
</head>

<body>

    <div class="glass-card max-w-lg w-full p-8 md:p-12 mx-4 relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500 rounded-full blur-[80px] opacity-20"></div>

        <div class="relative z-10 text-center">
            <div class="float inline-block mb-4">
                <span class="text-5xl">✨</span>
            </div>

            <h1 class="text-white text-3xl md:text-4xl font-extrabold tracking-tight mb-2">
                Unlock VIP <span class="text-blue-400">Privileges</span>
            </h1>
            <p class="text-gray-400 text-lg mb-8">Join our elite circle and get an instant <span
                    class="text-white font-bold text-xl italic">60% OFF</span> on your next purchase.</p>

            <form id="premiumForm" method="POST" class="space-y-4">
                <div class="text-left">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-widest ml-1">Email
                        Address</label>
                    <input type="email" name="email" required placeholder="name@company.com"
                        class="input-glass w-full mt-1 px-5 py-4 rounded-xl text-base">
                </div>

                <button type="submit" id="submit-btn"
                    class="animated-btn w-full text-white font-bold py-4 rounded-xl text-lg mt-2">
                    Claim My Discount →
                </button>
            </form>

            <p class="message p-4 text-white">
                <span class="pulse-dot"></span>
                <span id="user-count">128</span>+ founders & creators joined the waitlist
            </p>

            <div id="successContent" class="hidden scale-90 opacity-0 transition-all duration-500">
                <div class="bg-green-500/10 border border-green-500/20 p-6 rounded-2xl">
                    <p class="text-green-400 font-medium mb-2">Access Granted! Use Code:</p>
                    <div
                        class="text-4xl font-black text-white tracking-widest border-2 border-dashed border-white/20 py-3 rounded-lg mb-2">
                        PREMIUM60
                    </div>
                    <p class="text-gray-400 text-sm">Valid for the next 24 hours.</p>
                </div>
            </div>

            <p class="text-gray-500 text-xs mt-8">
                By joining, you agree to our <a href="#" class="underline hover:text-gray-300">Terms of Service</a>. No
                credit card required.
            </p>
        </div>
    </div>

</body>

</html>


<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, onSnapshot }
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBtndxvyBC6MNqbs4cgtrVV_ZMjFQyv7U0",
        authDomain: "lead-9c90e.firebaseapp.com",
        projectId: "lead-9c90e",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const usersRef = collection(db, "premiumForm");

    const counterElement = document.getElementById("user-count");

    onSnapshot(usersRef, (snapshot) => {
        counterElement.innerText = snapshot.size;
    });

    const form = document.getElementById("premiumForm");
    const successContent = document.getElementById('successContent');

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = form.email.value;
        const button = document.getElementById("submit-btn");

        button.innerHTML = "Joining...";
        button.disabled = true;

        form.style.display = 'none';

        successContent.classList.remove('hidden');
        setTimeout(() => {
            successContent.classList.remove('scale-90', 'opacity-0');
            successContent.classList.add('scale-100', 'opacity-100');
        }, 10);

        try {
            const q = query(usersRef, where("email", "==", email));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                alert("⚠️ Email already registered!");
                return;
            }

            await addDoc(usersRef, {
                email: email,
                createdAt: new Date()
            });

            alert("🎉 Success! You're in!");

        } catch (error) {
            alert("❌ Error: " + error.message);
        }
    });
</script>
